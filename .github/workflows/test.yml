name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Cites: package.json engines.node ">=18.0.0" (line 52)
          node-version: "18"

      - run: npm ci

      - run: npm test
